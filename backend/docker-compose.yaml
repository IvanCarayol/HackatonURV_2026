version: '3.8'

services:
  # The Ollama model engine
  ollama:
    image: ollama/ollama
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    labels:
      - "nl.nodesource.gpu.index=1"
    environment:
      - CUDA_VISIBLE_DEVICES=1 # Forzamos a nivel de driver la gráfica 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '1' ] # Especificamos explícitamente la GPU 1
              capabilities: [ gpu ]
    restart: unless-stopped

  # Our Python FastAPI translation layer
  llm-service:
    build:
      context: .
      dockerfile: llm-service/Dockerfile
    container_name: llm-medical-service
    ports:
      - "8001:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama-server:11434
    restart: unless-stopped

volumes:
  ollama_storage:
